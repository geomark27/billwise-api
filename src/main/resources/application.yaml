spring:
  application:
    name: billwise-api
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:billwise_dev}
    username: ${DB_USER:billwise}
    password: ${DB_PASSWORD:billwise}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 2

app:
  security:
    jwt:
      secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000

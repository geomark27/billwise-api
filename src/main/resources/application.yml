# ==========================================
# Billwise API — Configuración base
# ==========================================
spring:
  application:
    name: billwise-api

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

# Billwise config
billwise:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  superadmin:
    email: ${SUPERADMIN_EMAIL:admin@billwise.com}
    password: ${SUPERADMIN_PASSWORD:Admin1234!}
    name: ${SUPERADMIN_NAME:Super Admin}

---
# ==========================================
# Perfil: dev
# ==========================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5433}/${DB_NAME:billwise_dev}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:billwise_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

logging:
  level:
    com.billwise: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: INFO

billwise:
  jwt:
    secret: dev-secret-key-billwise-2024-must-be-at-least-256-bits-long-for-hs256

---
# ==========================================
# Perfil: prod
# ==========================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

logging:
  level:
    com.billwise: INFO
    org.springframework.security: WARN

spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:billwise_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

billwise:
  jwt:
    secret: test-secret-key-billwise-test-must-be-at-least-256-bits-long-ok
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

logging:
  level:
    com.billwise: WARN
    org.springframework.security: WARN
